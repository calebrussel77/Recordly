name: Publish release to WinGet

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to submit to WinGet
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Calebrussel77.Recordly
          installers-regex: 'windows\-x64\.exe$'
          version: ${{ inputs.tag_name }}
          release-tag: ${{ inputs.tag_name }}
          token: ${{ secrets.WINGET_ACC_TOKEN }}
