name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to build and publish
        required: true
        type: string
      make_latest:
        description: Mark the GitHub release as latest after assets upload
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      package_version: ${{ steps.prepare.outputs.package_version }}
      source_sha: ${{ steps.prepare.outputs.source_sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
      make_latest: ${{ steps.prepare.outputs.make_latest }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag_name }}
          fetch-depth: 0

      - name: Validate release tag
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
            MAKE_LATEST=true
          else
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            IS_PRERELEASE="$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json isPrerelease --jq '.isPrerelease' 2>/dev/null || echo false)"
            MAKE_LATEST="${{ github.event.inputs.make_latest }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "Release tag is required."
            exit 1
          fi

          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
              gh release create "$TAG_NAME" --repo "${{ github.repository }}" --verify-tag --draft --title "$TAG_NAME"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"

  build-windows-x64:
    name: Build Windows x64
    needs: prepare-release
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure optional Windows signing
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_P12_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_P12_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD)) {
            Write-Warning 'Windows signing secrets are missing. Building an unsigned installer.'
            Add-Content -Path $env:GITHUB_ENV -Value 'CSC_IDENTITY_AUTO_DISCOVERY=false'
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.p12'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_P12_BASE64))
          Add-Content -Path $env:GITHUB_ENV -Value "WIN_CSC_LINK=$certPath"
          Add-Content -Path $env:GITHUB_ENV -Value "WIN_CSC_KEY_PASSWORD=$env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install bundled FFmpeg binary
        run: node scripts/install-ffmpeg-static.mjs

      - name: Verify bundled FFmpeg binary
        run: |
          node -e "const fs=require('node:fs'); const ffmpeg=require('ffmpeg-static'); if (typeof ffmpeg !== 'string' || !fs.existsSync(ffmpeg)) { throw new Error('Bundled ffmpeg-static binary is missing: ' + ffmpeg); } console.log('Using bundled ffmpeg binary: ' + ffmpeg);"

      - name: Remove stale uiohook build output
        shell: pwsh
        run: |
          if (Test-Path node_modules/uiohook-napi/build) {
            Remove-Item node_modules/uiohook-napi/build -Recurse -Force
          }

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run build:platform-native-helpers
          npx tsc
          npx vite build
          npm run normalize:electron-main-cjs
          npm run smoke:electron-main-cjs
          npx electron-builder --win dir nsis --x64 --publish never

      - name: Smoke test packaged Windows paths
        run: npm run smoke:packaged-binaries

      - name: Generate Windows checksums
        run: npm run checksums:release -- SHA256SUMS-windows-x64.txt

      - name: Attest Windows artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: release/SHA256SUMS-windows-x64.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            release/SHA256SUMS*.txt
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    needs: prepare-release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.source_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxt-dev libxtst-dev libxkbfile-dev libxi-dev libxrandr-dev libxinerama-dev

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install bundled FFmpeg binary
        run: node scripts/install-ffmpeg-static.mjs

      - name: Verify bundled FFmpeg binary
        run: |
          node -e "const fs=require('node:fs'); const ffmpeg=require('ffmpeg-static'); if (typeof ffmpeg !== 'string' || !fs.existsSync(ffmpeg)) { throw new Error('Bundled ffmpeg-static binary is missing: ' + ffmpeg); } console.log('Using bundled ffmpeg binary: ' + ffmpeg);"

      - name: Remove stale uiohook build output
        run: rm -rf node_modules/uiohook-napi/build

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build Linux AppImage
        run: |
          npm run build:platform-native-helpers
          npx tsc
          npx vite build
          npm run normalize:electron-main-cjs
          npm run smoke:electron-main-cjs
          npx electron-builder --linux dir AppImage --x64 --publish never

      - name: Smoke test packaged Linux paths
        run: npm run smoke:packaged-binaries

      - name: Generate Linux checksums
        run: npm run checksums:release -- SHA256SUMS-linux-x64.txt

      - name: Attest Linux artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: release/SHA256SUMS-linux-x64.txt

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release
          path: |
            release/*.AppImage
            release/*.blockmap
            release/latest-linux.yml
            release/SHA256SUMS*.txt
          if-no-files-found: error

  publish-release-assets:
    name: Publish release assets
    needs:
      - prepare-release
      - build-windows-x64
      - build-linux-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-release
          path: release-assets/windows-x64

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release
          path: release-assets/linux-x64

      - name: Stage release assets
        shell: bash
        env:
          IS_PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets/upload
          assets=(
            release-assets/windows-x64/*.exe
            release-assets/windows-x64/*.blockmap
            release-assets/linux-x64/*.AppImage
            release-assets/linux-x64/*.blockmap
          )

          if [ "$IS_PRERELEASE" != "true" ]; then
            assets+=(
              release-assets/windows-x64/latest*.yml
              release-assets/linux-x64/latest-linux.yml
            )
          fi

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          for file in "${assets[@]}"; do
            target="release-assets/upload/$(basename "$file")"
            if [ -e "$target" ]; then
              echo "Duplicate release asset name: $(basename "$file")"
              exit 1
            fi
            cp "$file" "$target"
          done

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets/upload
          sha256sum * | sort -k2,2 > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-checksums: release-assets/upload/SHA256SUMS.txt

      - name: Upload release assets to GitHub
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/upload/*)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found to upload."
            exit 1
          fi

          gh release upload "${{ needs.prepare-release.outputs.tag_name }}" \
            "${assets[@]}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Mark release as latest
        if: needs.prepare-release.outputs.make_latest == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.prepare-release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --latest
